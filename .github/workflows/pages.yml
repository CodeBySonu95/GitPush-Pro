name: Deploy Pages

on:
  push:
    paths:
      - "assets/index.html"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: assets

      - uses: actions/deploy-pages@v4
